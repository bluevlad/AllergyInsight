services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allergyinsight-backend
    ports:
      - "9040:9040"
    environment:
      # Database (using shared postgresql container)
      - DATABASE_URL=postgresql://allergyinsight_svc:${DB_PASSWORD:?DB_PASSWORD is required}@postgresql:5432/allergyinsight
      # Google OAuth (ID 토큰 방식 - CLIENT_SECRET 불필요)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - SUPER_ADMIN_EMAILS=${SUPER_ADMIN_EMAILS:-}
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      # Existing
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}
      - PUBMED_EMAIL=${PUBMED_EMAIL:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DOWNLOAD_DIR=/app/downloads/papers
      - DEFAULT_MAX_RESULTS=20
      - SEARCH_TIMEOUT=30
      # Scheduler
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-false}
      - CRAWL_HOUR=${CRAWL_HOUR:-7}
      - CRAWL_MINUTE=${CRAWL_MINUTE:-0}
      - SEND_HOUR=${SEND_HOUR:-8}
      - SEND_MINUTE=${SEND_MINUTE:-0}
      # AI (Local LLM - MLX 서버 또는 Ollama)
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11435/v1}
      - LLM_MODEL=${LLM_MODEL:-mlx-community/EXAONE-3.5-7.8B-Instruct-4bit}
      # Email
      - GMAIL_ADDRESS=${GMAIL_ADDRESS:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      # Subscription
      - SUBSCRIPTION_BASE_URL=${SUBSCRIPTION_BASE_URL:-https://insight.unmong.com/subscribe}
    volumes:
      - backend_downloads:/app/downloads
      - chromadb_data:/app/data/chromadb
    networks:
      - database-network
      - allergyinsight-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9040/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allergyinsight-scheduler
    command: ["python", "-m", "app.scheduler.cli"]
    environment:
      - DATABASE_URL=postgresql://allergyinsight_svc:${DB_PASSWORD:?DB_PASSWORD is required}@postgresql:5432/allergyinsight
      - ENABLE_SCHEDULER=true
      - CRAWL_HOUR=${CRAWL_HOUR:-7}
      - CRAWL_MINUTE=${CRAWL_MINUTE:-0}
      - SEND_HOUR=${SEND_HOUR:-8}
      - SEND_MINUTE=${SEND_MINUTE:-0}
      # Paper search APIs
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}
      - PUBMED_EMAIL=${PUBMED_EMAIL:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # AI (Local LLM - MLX 서버 또는 Ollama)
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11435/v1}
      - LLM_MODEL=${LLM_MODEL:-mlx-community/EXAONE-3.5-7.8B-Instruct-4bit}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - SUBSCRIPTION_BASE_URL=${SUBSCRIPTION_BASE_URL:-https://insight.unmong.com/subscribe}
    depends_on:
      - backend
    networks:
      - database-network
      - allergyinsight-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    container_name: allergyinsight-frontend
    ports:
      - "4040:4040"
    depends_on:
      - backend
    networks:
      - allergyinsight-network
    restart: always

networks:
  database-network:
    external: true
  allergyinsight-network:
    driver: bridge

volumes:
  backend_downloads:
  chromadb_data:
